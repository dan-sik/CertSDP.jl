name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Fast Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version: ["1.10", "1"]
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v2
      - name: Instantiate
        run: julia --project -e 'using Pkg; Pkg.instantiate()'
      - name: Run tests
        run: julia --project --code-coverage=user -e 'using Pkg; Pkg.test()'
      - name: Upload coverage
        uses: julia-actions/julia-processcoverage@v1
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: lcov.info

  windows-verifier:
    name: Windows verifier-only smoke
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1"
      - uses: julia-actions/cache@v2
      - name: Instantiate
        run: julia --project -e 'using Pkg; Pkg.instantiate()'
      - name: Strict verifier smoke
        shell: bash
        run: |
          julia --project -e '
            using CertSDP
            result = certify(read_problem("examples/rational_problem.json"), [1//2, 1//3])
            verify(result) || error("public exact rational certify failed")
            write_certificate("windows-strict-smoke-cert.json", result)
          '
          julia --project -e '
            using CertSDP
            code = CertSDP.main(["verify", "--strict", "windows-strict-smoke-cert.json"])
            code == 0 || error("strict verifier smoke failed with exit code $code")
          '
  format:
    name: JuliaFormatter
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1"
      - uses: julia-actions/cache@v2
      - name: Check formatting
        run: |
          julia --project=@certsdp-format -e '
            using Pkg
            Pkg.add(; name="JuliaFormatter", version="1")
            using JuliaFormatter
            ok = format(["src", "ext", "test", "benchmarks"]; overwrite=false, verbose=false)
            ok || error("JuliaFormatter check failed")
          '
