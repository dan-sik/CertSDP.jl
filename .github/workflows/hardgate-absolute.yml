name: 2.1-ABSOLUTE Universal Reconstruction Gate

on:
  pull_request:
  workflow_dispatch:
    inputs:
      mode:
        description: "Gate mode"
        required: true
        default: "replay-only"
        type: choice
        options:
          - replay-only
          - rebuild-from-upstream

jobs:
  hardgate-absolute:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: "1"

      - uses: julia-actions/cache@v2

      - name: Instantiate
        run: julia --project -e 'using Pkg; Pkg.instantiate()'

      - name: Run 2.1-ABSOLUTE gate
        run: |
          if [ "${{ github.event.inputs.mode }}" = "rebuild-from-upstream" ]; then
            julia --project test/hardgate_4_0_absolute.jl --rebuild-from-upstream
          else
            julia --project test/hardgate_4_0_absolute.jl --replay-only
          fi
