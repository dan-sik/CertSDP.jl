name: 2.1R Real Artifact Hard Gate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  hardgate-real:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1"
      - uses: julia-actions/cache@v2
      - name: Instantiate
        run: julia --project -e 'using Pkg; Pkg.instantiate()'
      - name: Run 2.1R real artifact hard gate
        run: julia --project test/hardgate_4_0_real_artifacts.jl
