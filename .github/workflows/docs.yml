name: Docs

on:
  workflow_dispatch:

jobs:
  docs:
    name: Documenter build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1"
      - uses: julia-actions/cache@v2
      - name: Instantiate docs
        run: julia --project=docs -e 'using Pkg; Pkg.develop(Pkg.PackageSpec(path=pwd())); Pkg.instantiate()'
      - name: Build docs
        run: julia --project=docs docs/make.jl
